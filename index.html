<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đừng bấm vào :)</title>

  <meta property="og:title" content="Đừng bấm vào :)">
  <meta property="og:description" content="Bánh mì ram ram đang phét bơ">
  <meta property="og:type" content="website">
</head>

<body style="margin:0;background:black;color:white;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;cursor:pointer;">

  <h1 id="text">Click vào đây đi ( bấm vào )</h1>

  <audio id="rickroll">
    <source src="https://www.myinstants.com/media/sounds/rickroll.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById("rickroll");
    const text = document.getElementById("text");

    document.body.addEventListener("click", () => {

      // bước 1
      text.innerText = "Sao Bro lại bấm vào?????";

      // sau 3 giây → đổi text + phát nhạc
      setTimeout(() => {
        text.innerText = "Chúc mừng đã bị rickroll 😈";

        audio.play().catch(err => {
          console.log("Không phát được:", err);
        });

      }, 3000);

      // sau 8 giây → chuyển link
      setTimeout(() => {
        window.location.href = "https://www.mediafire.com/file/p1krsipp07z8kr8/may+thg+jet+jet+mods+1.21.11.zip/file";
      }, 8000);

    }, { once: true });
  </script>

</body>
</html>
