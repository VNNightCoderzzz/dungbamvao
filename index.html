<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đừng bấm vào :)</title>

  <!-- Meta Discord -->
  <meta property="og:title" content="Đừng bấm vào :)">
  <meta property="og:description" content="Bánh mì ram ram đang phét bơ">
  <meta property="og:type" content="website">
</head>

<body style="margin:0;background:black;color:white;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;">

  <h1 id="text">Sao Bro lại bấm vào?????</h1>

  <!-- Nhạc -->
  <audio id="rickroll">
    <source src="https://www.myinstants.com/media/sounds/rickroll.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById("rickroll");
    const text = document.getElementById("text");

    document.body.addEventListener("click", () => {

      text.innerText = "Sao Bro lại bấm vào?????";

      // delay 3s rồi phát nhạc + đổi text
      setTimeout(() => {
        text.innerText = "Chúc mừng đã bị rickroll ";
        audio.play();
      }, 1000);

      // delay 8s rồi chuyển link (để nghe được nhạc lâu hơn)
      setTimeout(() => {
        window.location.href = "https://www.mediafire.com/file/p1krsipp07z8kr8/may+thg+jet+jet+mods+1.21.11.zip/file";
      }, 5000);

    }, { once: true });
  </script>

</body>
</html>
